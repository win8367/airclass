<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI 학급관리 (V11-PRO-MAX)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Apple SD Gothic Neo', sans-serif; background-color: #f1f5f9; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border: 1px solid #e2e8f0; }
        .hidden-view { display: none; }
        textarea { resize: none; transition: all 0.2s; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .v-badge { background: #10b981; color: white; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: bold; margin-left: 8px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    </style>
</head>
<body>
    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2 cursor-pointer" onclick="goHome()">
            <span class="text-2xl">🎓</span>
            <h1 class="text-xl font-bold text-slate-800">Smart AI <span class="text-blue-600">학급관리</span> <span class="v-badge">V11-MAX</span></h1>
        </div>
        <div class="flex gap-2">
            <div id="connectionStatus" class="flex items-center text-xs font-medium mr-4 text-slate-400">
                <span class="status-dot bg-slate-300"></span> 연결 안 됨
            </div>
            <button onclick="toggleConfig()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-500">⚙️ 설정 및 모델 선택</button>
            <button id="backToListBtn" class="hidden-view text-blue-600 font-bold px-4 py-2 hover:bg-blue-50 rounded-lg" onclick="goHome()">← 목록으로</button>
        </div>
    </nav>

    <div id="configLayer" class="hidden-view max-w-6xl mx-auto p-4 space-y-4">
        <div class="card p-6 bg-blue-50 border-blue-200">
            <h3 class="font-bold text-blue-800 mb-4 flex items-center gap-2">🔑 AI 연결 및 모델 고정</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-xs font-bold text-blue-600 mb-1">API Key</label>
                    <input type="password" id="apiKeyInput" placeholder="API Key 입력" class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-xs font-bold text-blue-600 mb-1">사용할 AI 모델 선택</label>
                    <select id="modelSelect" class="w-full p-2 border rounded-lg outline-none bg-white">
                        <option value="auto">자동 최적 모델 선택 (권장)</option>
                    </select>
                </div>
            </div>
            <button onclick="saveApiKey()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition-all">설정 저장 및 연결 확인</button>
            <div id="apiStatusMessage" class="text-xs font-medium mt-2 text-center"></div>
        </div>

        <div class="card p-6 bg-slate-50 border-slate-200">
            <h3 class="font-bold text-slate-800 mb-2">데이터 백업 및 복구</h3>
            <div class="flex gap-3">
                <button onclick="exportDatabase()" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-700">전체 데이터 백업 (JSON)</button>
                <input type="file" id="importInput" class="hidden" accept=".json" onchange="importDatabase(event)">
                <button onclick="document.getElementById('importInput').click()" class="bg-white border border-slate-300 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-50">백업 파일 불러오기</button>
            </div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <div id="listView">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-6 gap-4">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">우리 반 명단</h2>
                    <p id="studentCount" class="text-slate-500 text-sm">로딩 중...</p>
                </div>
                <div class="flex gap-2 w-full md:w-auto">
                    <button onclick="exportSelectedCSV()" class="flex-1 md:flex-none border border-emerald-600 text-emerald-600 px-5 py-2.5 rounded-xl font-semibold hover:bg-emerald-50 transition-all">Excel(CSV) 내보내기</button>
                    <button onclick="addStudent()" class="flex-1 md:flex-none bg-blue-600 text-white px-5 py-2.5 rounded-xl font-semibold shadow-lg hover:bg-blue-700 transition-all">+ 학생 추가</button>
                </div>
            </div>
            <div class="card overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase w-12">
                                <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)" class="w-4 h-4 rounded">
                            </th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase w-16">번호</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">이름</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">최근 상담</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-400 text-right uppercase">관리</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

        <div id="detailView" class="hidden-view">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                    <h2 id="selectedStudentName" class="text-3xl font-bold text-slate-800">학생 이름</h2>
                    <p class="text-slate-500 text-sm italic">AI 분석을 통해 생활기록부 초안을 생성하세요.</p>
                </div>
                <button id="aiRunBtn" onclick="runAIAnalysis()" class="w-full md:w-auto bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-3">
                    <span id="aiBtnIcon">✨</span> <span id="aiBtnText">AI 생활기록부 자동 생성</span>
                </button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 space-y-6">
                    <div class="card p-6">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-lg font-bold flex items-center gap-2 text-slate-800">
                                <span class="w-2 h-6 bg-blue-600 rounded-full"></span> 1. 상담 기록
                            </h3>
                            <button onclick="addConsultation()" class="bg-blue-50 text-blue-600 px-4 py-1.5 rounded-full text-sm font-bold hover:bg-blue-100">+ 추가</button>
                        </div>
                        <div id="consultationList" class="space-y-4 max-h-[500px] overflow-y-auto pr-2"></div>
                    </div>
                    <div class="card p-6 border-emerald-100 bg-emerald-50/30">
                        <h3 class="text-lg font-bold flex items-center gap-2 mb-4 text-slate-800">
                            <span class="w-2 h-6 bg-emerald-500 rounded-full"></span> 2. 진로 지도 방향
                        </h3>
                        <textarea id="careerInput" oninput="saveCurrentData()" class="w-full h-32 p-4 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-400" placeholder="상담 내용을 바탕으로 진로 방향을 작성하세요..."></textarea>
                    </div>
                </div>
                <div class="space-y-6">
                    <div class="bg-slate-900 p-6 rounded-2xl shadow-xl text-white">
                        <h3 class="text-lg font-bold mb-4 flex items-center gap-2 text-yellow-400">
                            <span class="w-2 h-6 bg-yellow-400 rounded-full"></span> 3. 생기부 초안 (AI)
                        </h3>
                        <div class="space-y-6">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1 italic">세부능력 및 특기사항 (세특)</label>
                                <textarea id="seteukInput" oninput="saveCurrentData()" class="w-full h-48 p-4 text-sm bg-slate-800 border border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-yellow-400 text-slate-100" placeholder="AI가 작성한 세특 초안..."></textarea>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1 italic">행동특성 및 종합의견 (종특)</label>
                                <textarea id="jongteukInput" oninput="saveCurrentData()" class="w-full h-48 p-4 text-sm bg-slate-800 border border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-yellow-400 text-slate-100" placeholder="AI가 작성한 종특 초안..."></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let students = JSON.parse(localStorage.getItem('smartClass_v11') || '[]');
        let currentStudentId = null;
        let apiKey = localStorage.getItem('gemini_api_key_v11') || '';
        let availableModels = [];

        window.onload = () => {
            if(apiKey) {
                document.getElementById('apiKeyInput').value = apiKey;
                checkApiStatus();
            }
            renderList();
        };

        function saveData() { localStorage.setItem('smartClass_v11', JSON.stringify(students)); }

        function goHome() {
            document.getElementById('listView').classList.remove('hidden-view');
            document.getElementById('detailView').classList.add('hidden-view');
            document.getElementById('backToListBtn').classList.add('hidden-view');
            document.getElementById('configLayer').classList.add('hidden-view');
            renderList();
        }

        function toggleConfig() {
            document.getElementById('configLayer').classList.toggle('hidden-view');
        }

        async function checkApiStatus() {
            const statusDiv = document.getElementById('apiStatusMessage');
            const navStatus = document.getElementById('connectionStatus');
            const modelSelect = document.getElementById('modelSelect');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                const data = await response.json();
                
                if (response.ok && data.models) {
                    // 고성능 모델만 필터링 (gemini-1.5 우선)
                    const filtered = data.models
                        .filter(m => m.supportedGenerationMethods.includes('generateContent'))
                        .filter(m => m.name.includes('gemini')) // gemma 등 소형 모델 제외
                        .map(m => m.name.replace('models/', ''));

                    availableModels = filtered.sort((a, b) => {
                        if (a.includes('1.5-flash')) return -1;
                        if (b.includes('1.5-flash')) return 1;
                        return 0;
                    });

                    // 선택 메뉴 업데이트
                    modelSelect.innerHTML = '<option value="auto">자동 최적 모델 선택 (Flash 우선)</option>';
                    availableModels.forEach(m => {
                        const opt = document.createElement('option');
                        opt.value = m;
                        opt.innerText = m;
                        modelSelect.appendChild(opt);
                    });

                    statusDiv.className = "mt-2 text-xs font-medium text-emerald-600";
                    statusDiv.innerHTML = `✅ 연결 성공! (${availableModels.length}개의 고성능 모델 활성화)`;
                    navStatus.innerHTML = `<span class="status-dot bg-emerald-500"></span> 연결됨`;
                } else { throw new Error(); }
            } catch (e) {
                statusDiv.className = "mt-2 text-xs font-medium text-red-600";
                statusDiv.innerHTML = "❌ 연결 실패 (키를 확인하시거나 구글 AI 스튜디오 설정을 확인하세요)";
                navStatus.innerHTML = `<span class="status-dot bg-red-500"></span> 오류`;
            }
        }

        async function saveApiKey() {
            const val = document.getElementById('apiKeyInput').value.trim();
            if(!val) return alert("API 키를 입력해주세요.");
            apiKey = val;
            localStorage.setItem('gemini_api_key_v11', val);
            await checkApiStatus();
            alert("설정이 저장되었습니다.");
        }

        function addStudent() {
            const name = prompt("학생 이름을 입력하세요:");
            if (name && name.trim()) {
                students.push({
                    id: Date.now(),
                    name: name.trim(),
                    number: students.length + 1,
                    consultation: [],
                    career: "", seteuk: "", jongteuk: ""
                });
                saveData();
                renderList();
            }
        }

        function renderList() {
            const tbody = document.getElementById('studentTableBody');
            document.getElementById('studentCount').innerText = `전체 학생 수: ${students.length}명`;
            tbody.innerHTML = '';
            if (students.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-slate-400 italic">등록된 학생이 없습니다.</td></tr>`;
                return;
            }
            students.forEach(s => {
                const lastDate = s.consultation.length > 0 ? s.consultation[s.consultation.length-1].date : '-';
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-all cursor-pointer";
                tr.onclick = (e) => { if(e.target.type !== 'checkbox' && e.target.tagName !== 'BUTTON') viewDetail(s.id); };
                tr.innerHTML = `
                    <td class="px-6 py-4"><input type="checkbox" class="student-checkbox w-4 h-4 rounded" data-id="${s.id}"></td>
                    <td class="px-6 py-4 text-slate-400 font-medium">${s.number}</td>
                    <td class="px-6 py-4 font-bold text-slate-700">${s.name}</td>
                    <td class="px-6 py-4 text-sm text-slate-400">${lastDate}</td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="event.stopPropagation(); deleteStudent(${s.id})" class="text-slate-300 hover:text-red-500">🗑️</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function viewDetail(id) {
            currentStudentId = id;
            const s = students.find(x => x.id === id);
            document.getElementById('selectedStudentName').innerText = `👤 ${s.name} 학생`;
            document.getElementById('careerInput').value = s.career || '';
            document.getElementById('seteukInput').value = s.seteuk || '';
            document.getElementById('jongteukInput').value = s.jongteuk || '';
            renderConsultations(s);
            document.getElementById('listView').classList.add('hidden-view');
            document.getElementById('detailView').classList.remove('hidden-view');
            document.getElementById('backToListBtn').classList.remove('hidden-view');
            window.scrollTo(0,0);
        }

        function addConsultation() {
            const cat = prompt("항목(자격증, 학과공부, 근태, 수행평가 등):", "일반상담");
            const msg = prompt("상담 내용을 입력하세요:");
            if(cat && msg) {
                const s = students.find(x => x.id === currentStudentId);
                s.consultation.push({ id: Date.now(), date: new Date().toLocaleDateString(), category: cat, content: msg });
                saveData();
                renderConsultations(s);
            }
        }

        function editConsultation(cId) {
            const s = students.find(x => x.id === currentStudentId);
            const c = s.consultation.find(x => x.id === cId);
            const newContent = prompt("상담 기록 수정:", c.content);
            if(newContent !== null) {
                c.content = newContent;
                saveData();
                renderConsultations(s);
            }
        }

        function deleteConsultation(cId) {
            if(confirm("기록을 삭제할까요?")) {
                const s = students.find(x => x.id === currentStudentId);
                s.consultation = s.consultation.filter(x => x.id !== cId);
                saveData();
                renderConsultations(s);
            }
        }

        function renderConsultations(student) {
            const list = document.getElementById('consultationList');
            list.innerHTML = student.consultation.length === 0 ? `<div class="text-center py-10 border-2 border-dashed border-slate-100 rounded-xl text-slate-300 text-sm">상담 기록을 추가하세요.</div>` : '';
            [...student.consultation].reverse().forEach(c => {
                const d = document.createElement('div');
                d.className = "bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-sm group relative";
                d.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-bold text-blue-600 bg-white px-2 py-0.5 rounded border border-blue-100 uppercase">${c.category}</span>
                        <div class="flex gap-2 items-center">
                            <span class="text-[10px] text-slate-400">${c.date}</span>
                            <button onclick="editConsultation(${c.id})" class="hidden group-hover:block text-[10px] text-blue-500 font-bold">✏️ 수정</button>
                            <button onclick="deleteConsultation(${c.id})" class="hidden group-hover:block text-[10px] text-red-500 font-bold">🗑️ 삭제</button>
                        </div>
                    </div>
                    <p class="text-sm text-slate-700 whitespace-pre-wrap">${c.content}</p>
                `;
                list.appendChild(d);
            });
        }

        function saveCurrentData() {
            const s = students.find(x => x.id === currentStudentId);
            if(s) {
                s.career = document.getElementById('careerInput').value;
                s.seteuk = document.getElementById('seteukInput').value;
                s.jongteuk = document.getElementById('jongteukInput').value;
                saveData();
            }
        }

        async function runAIAnalysis() {
            if(!apiKey) return alert("설정에서 API 키를 먼저 등록해 주세요.");
            const student = students.find(x => x.id === currentStudentId);
            if(!student || student.consultation.length === 0) return alert("상담 기록이 최소 1개 이상 필요합니다.");

            const btn = document.getElementById('aiRunBtn');
            const btnText = document.getElementById('aiBtnText');
            const btnIcon = document.getElementById('aiBtnIcon');
            const selectedModel = document.getElementById('modelSelect').value;

            btn.disabled = true;
            btnIcon.innerHTML = `<div class="loader"></div>`;

            const history = student.consultation.map(c => `[${c.category}] ${c.content}`).join('\n');
            const promptText = `선생님으로서 다음 상담 기록을 토대로 생활기록부를 작성하세요. 반드시 [CAREER], [SETEUK], [JONGTEUK] 태그를 사용하여 구분하세요.
            
[학생: ${student.name}]
[상담 내용]
${history}

1. [CAREER]: 향후 지도 방향
2. [SETEUK]: 과목별 세부능력(~함 문체)
3. [JONGTEUK]: 행동특성 및 종합의견(~함 문체)`;

            // 시도할 모델 결정
            let modelsToTry = selectedModel === 'auto' ? availableModels.slice(0, 5) : [selectedModel];
            let success = false;

            for (const modelName of modelsToTry) {
                try {
                    btnText.innerText = `${modelName} 분석 중...`;
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
                    const response = await fetch(url, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                    });
                    const data = await response.json();
                    
                    if (response.ok && data.candidates?.[0]?.content?.parts?.[0]?.text) {
                        const aiResult = data.candidates[0].content.parts[0].text;
                        
                        let career = aiResult.split('[CAREER]')[1]?.split('[SETEUK]')[0]?.replace(/:/g, '').trim();
                        let seteuk = aiResult.split('[SETEUK]')[1]?.split('[JONGTEUK]')[0]?.replace(/:/g, '').trim();
                        let jongteuk = aiResult.split('[JONGTEUK]')[1]?.replace(/:/g, '').trim();

                        if (!career && !seteuk && !jongteuk) career = aiResult;

                        if(career) document.getElementById('careerInput').value = career;
                        if(seteuk) document.getElementById('seteukInput').value = seteuk;
                        if(jongteuk) document.getElementById('jongteukInput').value = jongteuk;
                        
                        saveCurrentData();
                        alert(`✨ 분석 완료! (사용 모델: ${modelName})`);
                        success = true;
                        break;
                    }
                } catch (e) {}
            }

            if(!success) alert("모든 성능 좋은 모델이 현재 응답하지 않습니다. 잠시 후 다시 시도하세요.");
            btn.disabled = false;
            btnText.innerText = "AI 생활기록부 자동 생성";
            btnIcon.innerHTML = "✨";
        }

        function exportSelectedCSV() {
            const selectedIds = Array.from(document.querySelectorAll('.student-checkbox:checked')).map(cb => parseInt(cb.dataset.id));
            if(selectedIds.length === 0) return alert("학생을 선택해 주세요.");
            
            let csv = "번호,이름,진로지도,세특,종특\n";
            students.filter(s => selectedIds.includes(s.id)).forEach(s => {
                csv += `${s.number},${s.name},"${s.career.replace(/"/g, '""')}","${s.seteuk.replace(/"/g, '""')}","${s.jongteuk.replace(/"/g, '""')}"\n`;
            });

            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `학급관리_백업.csv`;
            link.click();
        }

        function exportDatabase() {
            const blob = new Blob([JSON.stringify(students)], { type: 'application/json' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `smart_class_v11_backup.json`;
            link.click();
        }

        function importDatabase(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    students = JSON.parse(e.target.result);
                    saveData();
                    renderList();
                    alert("데이터가 복구되었습니다.");
                } catch (e) { alert("잘못된 파일입니다."); }
            };
            reader.readAsText(event.target.files[0]);
        }

        function toggleSelectAll(master) {
            document.querySelectorAll('.student-checkbox').forEach(cb => cb.checked = master.checked);
        }

        function deleteStudent(id) {
            if(confirm("정보를 삭제하시겠습니까?")) {
                students = students.filter(s => s.id !== id);
                saveData();
                renderList();
            }
        }
    </script>
</body>
</html>
