<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI 학급관리 (Stable Version)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Apple SD Gothic Neo', sans-serif; background-color: #f1f5f9; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border: 1px solid #e2e8f0; }
        .hidden-view { display: none; }
        textarea { resize: none; transition: all 0.2s; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2 cursor-pointer" onclick="goHome()">
            <span class="text-2xl">🤖</span>
            <h1 class="text-xl font-bold text-slate-800">Smart AI 학급관리 <span class="text-[10px] bg-green-100 text-green-600 px-2 py-0.5 rounded ml-2">Stable v2</span></h1>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleConfig()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-500">⚙️ 설정</button>
            <button id="backToListBtn" class="hidden-view text-blue-600 font-bold px-4 py-2 hover:bg-blue-50 rounded-lg">← 목록으로</button>
        </div>
    </nav>

    <div id="configLayer" class="hidden-view max-w-6xl mx-auto p-4">
        <div class="card p-6 bg-blue-50 border-blue-200">
            <h3 class="font-bold text-blue-800 mb-2">AI 설정 (Gemini API)</h3>
            <p class="text-sm text-blue-600 mb-4">구글 AI 스튜디오에서 발급받은 API 키를 입력하세요. (Gemini Pro 모델 사용)</p>
            <div class="flex gap-2">
                <input type="password" id="apiKeyInput" placeholder="API Key를 입력하세요" class="flex-1 p-2 border rounded-lg outline-none">
                <button onclick="saveApiKey()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">저장</button>
            </div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <div id="listView">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">우리 반 명단</h2>
                    <p id="studentCount" class="text-slate-500 text-sm">로딩 중...</p>
                </div>
                <button onclick="addStudent()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-semibold shadow-lg hover:bg-blue-700 active:scale-95 transition-all">+ 학생 추가</button>
            </div>
            
            <div class="card overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">번호</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">이름</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">최근 상담</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-400 text-right uppercase">관리</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

        <div id="detailView" class="hidden-view">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                    <h2 id="selectedStudentName" class="text-3xl font-bold text-slate-800">학생 이름</h2>
                    <p class="text-slate-500 text-sm italic">상담 내용을 바탕으로 AI 리포트를 생성합니다.</p>
                </div>
                <button id="aiRunBtn" onclick="runAIAnalysis()" class="w-full md:w-auto bg-gradient-to-r from-purple-600 to-blue-600 text-white px-6 py-3 rounded-xl font-bold shadow-xl hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2">
                    <span id="aiBtnIcon">✨</span> <span id="aiBtnText">AI로 생기부 자동 정리</span>
                </button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 space-y-6">
                    <div class="card p-6">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-lg font-bold flex items-center gap-2 text-slate-800">
                                <span class="w-2 h-6 bg-blue-600 rounded-full"></span> 1. 개별 상담 내역
                            </h3>
                            <button onclick="addConsultation()" class="bg-blue-50 text-blue-600 px-4 py-1.5 rounded-full text-sm font-bold hover:bg-blue-100">+ 추가</button>
                        </div>
                        <div id="consultationList" class="space-y-4 max-h-[400px] overflow-y-auto pr-2"></div>
                    </div>

                    <div class="card p-6 border-emerald-100 bg-emerald-50/30">
                        <h3 class="text-lg font-bold flex items-center gap-2 mb-4 text-slate-800">
                            <span class="w-2 h-6 bg-emerald-500 rounded-full"></span> 2. AI 추천 진로 지도 방향
                        </h3>
                        <textarea id="careerInput" oninput="saveCurrentData()" class="w-full h-32 p-4 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-400" placeholder="상담 내용을 바탕으로 진로 방향을 입력하세요..."></textarea>
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="bg-slate-900 p-6 rounded-2xl shadow-xl text-white">
                        <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                            <span class="w-2 h-6 bg-yellow-400 rounded-full"></span> 3. 생기부 초안 (AI)
                        </h3>
                        <div class="space-y-6">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1 italic">세부능력 및 특기사항 (초안)</label>
                                <textarea id="seteukInput" oninput="saveCurrentData()" class="w-full h-48 p-4 text-sm bg-slate-800 border border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-yellow-400 text-slate-100" placeholder="AI가 작성한 세특 내용..."></textarea>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1 italic">행동특성 및 종합의견 (초안)</label>
                                <textarea id="jongteukInput" oninput="saveCurrentData()" class="w-full h-48 p-4 text-sm bg-slate-800 border border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-yellow-400 text-slate-100" placeholder="AI가 작성한 종특 내용..."></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let students = JSON.parse(localStorage.getItem('smartClass_v2') || '[]');
        let currentStudentId = null;
        let apiKey = localStorage.getItem('gemini_api_key') || '';

        window.onload = () => {
            if(apiKey) document.getElementById('apiKeyInput').value = apiKey;
            renderList();
        };

        function goHome() {
            document.getElementById('listView').classList.remove('hidden-view');
            document.getElementById('detailView').classList.add('hidden-view');
            document.getElementById('backToListBtn').classList.add('hidden-view');
            document.getElementById('configLayer').classList.add('hidden-view');
            renderList();
        }

        function toggleConfig() {
            document.getElementById('configLayer').classList.toggle('hidden-view');
        }

        function saveApiKey() {
            const val = document.getElementById('apiKeyInput').value.trim();
            if(!val) return alert("API 키를 입력해주세요.");
            apiKey = val;
            localStorage.setItem('gemini_api_key', val);
            alert("키가 저장되었습니다.");
            toggleConfig();
        }

        function addStudent() {
            const name = prompt("학생 이름을 입력하세요:");
            if (name && name.trim()) {
                students.push({
                    id: Date.now(),
                    name: name.trim(),
                    number: students.length + 1,
                    consultation: [],
                    career: "", seteuk: "", jongteuk: ""
                });
                saveData();
                renderList();
            }
        }

        function renderList() {
            const tbody = document.getElementById('studentTableBody');
            document.getElementById('studentCount').innerText = `전체 학생 수: ${students.length}명`;
            tbody.innerHTML = '';
            if (students.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-12 text-center text-slate-400 italic">등록된 학생이 없습니다.</td></tr>`;
                return;
            }
            students.forEach(s => {
                const lastDate = s.consultation.length > 0 ? s.consultation[s.consultation.length-1].date : '-';
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-all";
                tr.innerHTML = `
                    <td class="px-6 py-4 text-slate-400 font-medium">${s.number}</td>
                    <td class="px-6 py-4 font-bold text-slate-700">${s.name}</td>
                    <td class="px-6 py-4 text-sm text-slate-400">${lastDate}</td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="viewDetail(${s.id})" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold hover:shadow-lg transition-all">상세/상담</button>
                        <button onclick="deleteStudent(${s.id})" class="ml-2 text-slate-300 hover:text-red-500">🗑️</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function viewDetail(id) {
            currentStudentId = id;
            const s = students.find(x => x.id === id);
            document.getElementById('selectedStudentName').innerText = `👤 ${s.name} 학생`;
            document.getElementById('careerInput').value = s.career || '';
            document.getElementById('seteukInput').value = s.seteuk || '';
            document.getElementById('jongteukInput').value = s.jongteuk || '';
            renderConsultations(s);
            document.getElementById('listView').classList.add('hidden-view');
            document.getElementById('detailView').classList.remove('hidden-view');
            document.getElementById('backToListBtn').classList.remove('hidden-view');
            window.scrollTo(0,0);
        }

        function addConsultation() {
            const cat = prompt("상담 항목 (예: 자격증, 근태, 수행평가 등):", "일반상담");
            const msg = prompt("상담 내용을 입력하세요:");
            if(cat && msg) {
                const s = students.find(x => x.id === currentStudentId);
                s.consultation.push({ date: new Date().toLocaleDateString(), category: cat, content: msg });
                saveData();
                renderConsultations(s);
            }
        }

        function renderConsultations(student) {
            const list = document.getElementById('consultationList');
            list.innerHTML = student.consultation.length === 0 ? `<div class="text-center py-10 border-2 border-dashed border-slate-100 rounded-xl text-slate-300 text-sm">상담 기록이 없습니다.</div>` : '';
            [...student.consultation].reverse().forEach(c => {
                const d = document.createElement('div');
                d.className = "bg-slate-50 p-4 rounded-xl border border-slate-100";
                d.innerHTML = `<div class="flex justify-between items-center mb-1"><span class="text-[10px] font-bold text-blue-600 bg-white px-2 py-0.5 rounded border border-blue-100 uppercase">${c.category}</span><span class="text-[10px] text-slate-400">${c.date}</span></div><p class="text-sm text-slate-700">${c.content}</p>`;
                list.appendChild(d);
            });
        }

        function saveCurrentData() {
            const s = students.find(x => x.id === currentStudentId);
            if(s) {
                s.career = document.getElementById('careerInput').value;
                s.seteuk = document.getElementById('seteukInput').value;
                s.jongteuk = document.getElementById('jongteukInput').value;
                saveData();
            }
        }

        function deleteStudent(id) {
            if(confirm("정말 삭제하시겠습니까?")) {
                students = students.filter(x => x.id !== id);
                saveData();
                renderList();
            }
        }

        function saveData() { localStorage.setItem('smartClass_v2', JSON.stringify(students)); }

        async function runAIAnalysis() {
            if(!apiKey) return alert("설정(⚙️) 메뉴에서 API 키를 입력해 주세요.");
            const student = students.find(x => x.id === currentStudentId);
            if(student.consultation.length === 0) return alert("분석할 상담 기록이 없습니다.");

            const btn = document.getElementById('aiRunBtn');
            const btnText = document.getElementById('aiBtnText');
            const btnIcon = document.getElementById('aiBtnIcon');

            btn.disabled = true;
            btnText.innerText = "AI 분석 진행 중...";
            btnIcon.innerHTML = `<div class="loader"></div>`;

            const history = student.consultation.map(c => `[${c.category}] ${c.content}`).join('\n');
            const promptText = `학생 이름: ${student.name}\n상담 기록:\n${history}\n위 내용을 바탕으로 학생생활기록부를 작성하라.\n1. [CAREER]: 진로 지도 방향 (3줄)\n2. [SETEUK]: 세부능력 및 특기사항 (~함, ~임 체)\n3. [JONGTEUK]: 행동특성 및 종합의견 (~함, ~임 체)\n형식: [CAREER]내용[SETEUK]내용[JONGTEUK]내용`;

            try {
                // 모델을 gemini-pro로 변경하여 범용성을 높임
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${apiKey.trim()}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error?.message || "서버 응답 오류");
                }

                const data = await response.json();
                
                if (!data.candidates || data.candidates.length === 0) {
                    throw new Error("AI가 답변을 생성하지 못했습니다.");
                }

                const aiResult = data.candidates[0].content.parts[0].text;

                const c = aiResult.split('[CAREER]')[1]?.split('[SETEUK]')[0]?.trim();
                const s = aiResult.split('[SETEUK]')[1]?.split('[JONGTEUK]')[0]?.trim();
                const j = aiResult.split('[JONGTEUK]')[1]?.trim();

                if(c) document.getElementById('careerInput').value = c;
                if(s) document.getElementById('seteukInput').value = s;
                if(j) document.getElementById('jongteukInput').value = j;

                saveCurrentData();
                alert("AI 분석이 성공적으로 완료되었습니다!");
            } catch (error) {
                console.error("AI Error:", error);
                alert(`오류 발생: ${error.message}\n\n모델명을 'gemini-pro'로 변경하여 다시 시도합니다. 오류가 계속되면 키를 확인해 주세요.`);
            } finally {
                btn.disabled = false;
                btnText.innerText = "AI로 생기부 자동 정리";
                btnIcon.innerHTML = "✨";
            }
        }
    </script>
</body>
</html>
