<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI 학급관리 (V8-ULTIMATE)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Apple SD Gothic Neo', sans-serif; background-color: #f1f5f9; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border: 1px solid #e2e8f0; }
        .hidden-view { display: none; }
        textarea { resize: none; transition: all 0.2s; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .v-badge { background: #f59e0b; color: white; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: bold; margin-left: 8px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .error-box { background: #fef2f2; border: 1px solid #fee2e2; color: #991b1b; padding: 1rem; border-radius: 0.5rem; margin-top: 1rem; font-size: 0.8rem; display: none; }
    </style>
</head>
<body>
    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2 cursor-pointer" onclick="goHome()">
            <span class="text-2xl">🤖</span>
            <h1 class="text-xl font-bold text-slate-800">Smart AI <span class="text-blue-600">학급관리</span> <span class="v-badge">V8-ULTIMATE</span></h1>
        </div>
        <div class="flex gap-2">
            <div id="connectionStatus" class="flex items-center text-xs font-medium mr-4 text-slate-400">
                <span class="status-dot bg-slate-300"></span> 연결 안 됨
            </div>
            <button onclick="toggleConfig()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-500">⚙️ 설정</button>
            <button id="backToListBtn" class="hidden-view text-blue-600 font-bold px-4 py-2 hover:bg-blue-50 rounded-lg" onclick="goHome()">← 목록으로</button>
        </div>
    </nav>

    <div id="configLayer" class="hidden-view max-w-6xl mx-auto p-4">
        <div class="card p-6 bg-blue-50 border-blue-200">
            <h3 class="font-bold text-blue-800 mb-2">AI 모델 연결 설정</h3>
            <p class="text-sm text-blue-600 mb-4">구글 AI 스튜디오 API 키를 입력하세요. V8은 모델을 자동으로 찾습니다.</p>
            <div class="flex gap-2">
                <input type="password" id="apiKeyInput" placeholder="API Key 입력" class="flex-1 p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
                <button onclick="saveApiKey()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition-all">연결 및 저장</button>
            </div>
            <div id="apiStatusMessage" class="mt-2 text-xs font-medium"></div>
            <div id="debugError" class="error-box"></div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <div id="listView">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">우리 반 명단</h2>
                    <p id="studentCount" class="text-slate-500 text-sm">로딩 중...</p>
                </div>
                <button onclick="addStudent()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-semibold shadow-lg hover:bg-blue-700 transition-all">+ 학생 추가</button>
            </div>
            <div class="card overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">번호</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">이름</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">최근 상담</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-400 text-right uppercase">관리</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

        <div id="detailView" class="hidden-view">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                    <h2 id="selectedStudentName" class="text-3xl font-bold text-slate-800">학생 이름</h2>
                    <p class="text-slate-500 text-sm italic">상담 내용을 AI가 분석하여 생기부 초안을 생성합니다.</p>
                </div>
                <button id="aiRunBtn" onclick="runAIAnalysis()" class="w-full md:w-auto bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-3">
                    <span id="aiBtnIcon">✨</span> <span id="aiBtnText">AI 생활기록부 자동 생성</span>
                </button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 space-y-6">
                    <div class="card p-6">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-lg font-bold flex items-center gap-2 text-slate-800">
                                <span class="w-2 h-6 bg-blue-600 rounded-full"></span> 1. 개별 상담 내역
                            </h3>
                            <button onclick="addConsultation()" class="bg-blue-50 text-blue-600 px-4 py-1.5 rounded-full text-sm font-bold hover:bg-blue-100">+ 추가</button>
                        </div>
                        <div id="consultationList" class="space-y-4 max-h-[400px] overflow-y-auto pr-2"></div>
                    </div>
                    <div class="card p-6 border-emerald-100 bg-emerald-50/30">
                        <h3 class="text-lg font-bold flex items-center gap-2 mb-4 text-slate-800">
                            <span class="w-2 h-6 bg-emerald-500 rounded-full"></span> 2. 진로 지도 방향
                        </h3>
                        <textarea id="careerInput" oninput="saveCurrentData()" class="w-full h-32 p-4 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-400" placeholder="AI가 상담 기록을 분석하여 진로 방향을 제시합니다..."></textarea>
                    </div>
                </div>
                <div class="space-y-6">
                    <div class="bg-slate-900 p-6 rounded-2xl shadow-xl text-white">
                        <h3 class="text-lg font-bold mb-4 flex items-center gap-2 text-yellow-400">
                            <span class="w-2 h-6 bg-yellow-400 rounded-full"></span> 3. 생기부 초안 (AI)
                        </h3>
                        <div class="space-y-6">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1 italic">세부능력 및 특기사항</label>
                                <textarea id="seteukInput" oninput="saveCurrentData()" class="w-full h-48 p-4 text-sm bg-slate-800 border border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-yellow-400 text-slate-100" placeholder="상담 내용을 바탕으로 작성된 세특 초안..."></textarea>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1 italic">행동특성 및 종합의견</label>
                                <textarea id="jongteukInput" oninput="saveCurrentData()" class="w-full h-48 p-4 text-sm bg-slate-800 border border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-yellow-400 text-slate-100" placeholder="상담 내용을 바탕으로 작성된 종특 초안..."></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let students = JSON.parse(localStorage.getItem('smartClass_v8') || '[]');
        let currentStudentId = null;
        let apiKey = localStorage.getItem('gemini_api_key_v8') || '';
        let availableModels = [];

        window.onload = () => {
            if(apiKey) {
                document.getElementById('apiKeyInput').value = apiKey;
                checkApiStatus();
            }
            renderList();
        };

        function goHome() {
            document.getElementById('listView').classList.remove('hidden-view');
            document.getElementById('detailView').classList.add('hidden-view');
            document.getElementById('backToListBtn').classList.add('hidden-view');
            document.getElementById('configLayer').classList.add('hidden-view');
            renderList();
        }

        function toggleConfig() {
            document.getElementById('configLayer').classList.toggle('hidden-view');
        }

        async function saveApiKey() {
            const val = document.getElementById('apiKeyInput').value.trim();
            if(!val) return alert("API 키를 입력해주세요.");
            apiKey = val;
            localStorage.setItem('gemini_api_key_v8', val);
            await checkApiStatus();
        }

        async function checkApiStatus() {
            const statusDiv = document.getElementById('apiStatusMessage');
            const debugDiv = document.getElementById('debugError');
            const navStatus = document.getElementById('connectionStatus');
            
            statusDiv.innerHTML = "⏳ 모델 목록 탐색 중...";
            debugDiv.style.display = "none";

            try {
                // v1beta 주소를 사용하여 현재 키로 쓸 수 있는 모든 모델 조회
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                const data = await response.json();

                if (response.ok && data.models) {
                    availableModels = data.models
                        .filter(m => m.supportedGenerationMethods.includes('generateContent'))
                        .map(m => m.name.replace('models/', ''));
                    
                    if (availableModels.length > 0) {
                        statusDiv.className = "mt-2 text-xs font-medium text-emerald-600";
                        statusDiv.innerHTML = `✅ 연결 성공! (${availableModels.length}개 모델 사용 가능: ${availableModels[0]} 등)`;
                        navStatus.innerHTML = `<span class="status-dot bg-emerald-500"></span> 연결됨`;
                        navStatus.className = "flex items-center text-xs font-medium mr-4 text-emerald-600";
                    } else {
                        throw new Error("사용 가능한 생성 모델이 없습니다.");
                    }
                } else {
                    throw new Error(data.error?.message || "API 키가 올바르지 않거나 권한이 없습니다.");
                }
            } catch (e) {
                statusDiv.className = "mt-2 text-xs font-medium text-red-600";
                statusDiv.innerHTML = "❌ 연결 실패 (설정 확인 필요)";
                navStatus.innerHTML = `<span class="status-dot bg-red-500"></span> 오류`;
                navStatus.className = "flex items-center text-xs font-medium mr-4 text-red-600";
                debugDiv.style.display = "block";
                debugDiv.innerHTML = `<strong>상세 원인:</strong> ${e.message}<br><br>💡 해결책: 개인 Gmail 계정으로 AI Studio 키를 새로 발급받으세요. 학교/기업 계정은 막혀있는 경우가 많습니다.`;
            }
        }

        function addStudent() {
            const name = prompt("학생 이름을 입력하세요:");
            if (name && name.trim()) {
                students.push({
                    id: Date.now(),
                    name: name.trim(),
                    number: students.length + 1,
                    consultation: [],
                    career: "", seteuk: "", jongteuk: ""
                });
                saveData();
                renderList();
            }
        }

        function renderList() {
            const tbody = document.getElementById('studentTableBody');
            document.getElementById('studentCount').innerText = `전체 학생 수: ${students.length}명`;
            tbody.innerHTML = '';
            if (students.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-12 text-center text-slate-400 italic">등록된 학생이 없습니다.</td></tr>`;
                return;
            }
            students.forEach(s => {
                const lastDate = s.consultation.length > 0 ? s.consultation[s.consultation.length-1].date : '-';
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-all cursor-pointer";
                tr.onclick = (e) => { if(e.target.tagName !== 'BUTTON') viewDetail(s.id); };
                tr.innerHTML = `
                    <td class="px-6 py-4 text-slate-400 font-medium">${s.number}</td>
                    <td class="px-6 py-4 font-bold text-slate-700">${s.name}</td>
                    <td class="px-6 py-4 text-sm text-slate-400">${lastDate}</td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="event.stopPropagation(); deleteStudent(${s.id})" class="text-slate-300 hover:text-red-500">🗑️</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function viewDetail(id) {
            currentStudentId = id;
            const s = students.find(x => x.id === id);
            document.getElementById('selectedStudentName').innerText = `👤 ${s.name} 학생`;
            document.getElementById('careerInput').value = s.career || '';
            document.getElementById('seteukInput').value = s.seteuk || '';
            document.getElementById('jongteukInput').value = s.jongteuk || '';
            renderConsultations(s);
            document.getElementById('listView').classList.add('hidden-view');
            document.getElementById('detailView').classList.remove('hidden-view');
            document.getElementById('backToListBtn').classList.remove('hidden-view');
            window.scrollTo(0,0);
        }

        function addConsultation() {
            const cat = prompt("상담 항목 (예: 자격증, 학과공부, 근태, 수행평가 등):", "일반상담");
            const msg = prompt("상담 내용을 자세히 입력하세요:");
            if(cat && msg) {
                const s = students.find(x => x.id === currentStudentId);
                s.consultation.push({ date: new Date().toLocaleDateString(), category: cat, content: msg });
                saveData();
                renderConsultations(s);
            }
        }

        function renderConsultations(student) {
            const list = document.getElementById('consultationList');
            list.innerHTML = student.consultation.length === 0 ? `<div class="text-center py-10 border-2 border-dashed border-slate-100 rounded-xl text-slate-300 text-sm">기록이 없습니다.</div>` : '';
            [...student.consultation].reverse().forEach(c => {
                const d = document.createElement('div');
                d.className = "bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-sm";
                d.innerHTML = `<div class="flex justify-between items-center mb-1"><span class="text-[10px] font-bold text-blue-600 bg-white px-2 py-0.5 rounded border border-blue-100 uppercase">${c.category}</span><span class="text-[10px] text-slate-400">${c.date}</span></div><p class="text-sm text-slate-700">${c.content}</p>`;
                list.appendChild(d);
            });
        }

        function saveCurrentData() {
            const s = students.find(x => x.id === currentStudentId);
            if(s) {
                s.career = document.getElementById('careerInput').value;
                s.seteuk = document.getElementById('seteukInput').value;
                s.jongteuk = document.getElementById('jongteukInput').value;
                saveData();
            }
        }

        function deleteStudent(id) {
            if(confirm("정말 삭제하시겠습니까?")) {
                students = students.filter(x => x.id !== id);
                saveData();
                renderList();
            }
        }

        function saveData() { localStorage.setItem('smartClass_v8', JSON.stringify(students)); }

        async function runAIAnalysis() {
            if(!apiKey) return alert("설정(⚙️)에서 API 키를 먼저 등록해 주세요.");
            const student = students.find(x => x.id === currentStudentId);
            if(!student || student.consultation.length === 0) return alert("상담 기록이 최소 1개 이상 필요합니다.");

            const btn = document.getElementById('aiRunBtn');
            const btnText = document.getElementById('aiBtnText');
            const btnIcon = document.getElementById('aiBtnIcon');

            btn.disabled = true;
            btnIcon.innerHTML = `<div class="loader"></div>`;

            const history = student.consultation.map(c => `[${c.category}] ${c.content}`).join('\n');
            const promptText = `학교 선생님으로서 학생의 상담 기록을 바탕으로 생활기록부를 작성하라.
학생 이름: ${student.name}
상담 내용:
${history}

요청 사항:
1. [CAREER]: 향후 진로 지도 방향 (3줄 요약)
2. [SETEUK]: 과목별 세부능력 및 특기사항 (~함, ~임 문체로 작성)
3. [JONGTEUK]: 행동특성 및 종합의견 (~함, ~임 문체로 작성)

형식: [CAREER]내용[SETEUK]내용[JONGTEUK]내용`;

            // 모델 목록이 없으면 새로 고침
            if (availableModels.length === 0) await checkApiStatus();
            
            // 시도할 모델 순서 (Flash -> Pro -> Pro 순)
            const modelsToTry = availableModels.length > 0 ? availableModels : ['gemini-1.5-flash', 'gemini-1.5-pro', 'gemini-pro'];
            let lastError = "";

            for (const modelName of modelsToTry) {
                try {
                    btnText.innerText = `${modelName} 분석 중...`;
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                    });

                    const data = await response.json();

                    if (response.ok && data.candidates?.[0]) {
                        const aiResult = data.candidates[0].content.parts[0].text;
                        
                        // 결과 파싱
                        const c = aiResult.split('[CAREER]')[1]?.split('[SETEUK]')[0]?.trim();
                        const s = aiResult.split('[SETEUK]')[1]?.split('[JONGTEUK]')[0]?.trim();
                        const j = aiResult.split('[JONGTEUK]')[1]?.trim();

                        if(c) document.getElementById('careerInput').value = c;
                        if(s) document.getElementById('seteukInput').value = s;
                        if(j) document.getElementById('jongteukInput').value = j;

                        saveCurrentData();
                        alert(`✨ AI 분석 완료! (사용 모델: ${modelName})`);
                        btn.disabled = false;
                        btnText.innerText = "AI 생활기록부 자동 생성";
                        btnIcon.innerHTML = "✨";
                        return; // 성공 시 종료
                    } else {
                        lastError = data.error?.message || "알 수 없는 응답 오류";
                    }
                } catch (e) {
                    lastError = e.message;
                }
            }

            // 모든 모델 실패 시
            alert(`❌ 모든 AI 모델 연결에 실패했습니다.\n\n사유: ${lastError}\n\n도움말: API 키 설정을 다시 확인해 주세요.`);
            btn.disabled = false;
            btnText.innerText = "AI 생활기록부 자동 생성";
            btnIcon.innerHTML = "✨";
        }
    </script>
</body>
</html>
